<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Vault</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f7;
            margin: 0;
        }

        .landing {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            max-width: 500px;
            padding: 24px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .drop-zone {
            border: 2px dashed #ccc;
            padding: 40px;
            border-radius: 12px;
            background: white;
            cursor: pointer;
        }

            .drop-zone:hover {
                border-color: #007aff;
            }

        #fileInput {
            display: none;
        }

        .status {
            margin-top: 15px;
            font-size: 14px;
            color: green;
        }

        .chat-view {
            display: none;
            min-height: 100vh;
            background: #e9e9eb;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(245, 245, 247, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #ddd;
            padding: 14px 20px;
            z-index: 10;
        }

        .chat-header-left {
            display: flex;
            flex-direction: column;
        }

        .chat-header-name {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header-meta {
            font-size: 12px;
            color: #666;
        }

        #downloadBtn {
            background: #007aff;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

            #downloadBtn:hover {
                opacity: 0.9;
            }

        .chat-messages {
            max-width: 760px;
            margin: 0 auto;
            padding: 20px 16px 40px;
        }

        .message-row {
            display: flex;
            margin: 10px 0;
            width: 100%;
        }

            .message-row.me {
                justify-content: flex-end;
            }

            .message-row.them {
                justify-content: flex-start;
            }

            .message-row.group-middle,
            .message-row.group-end {
                margin-top: 2px;
            }

            .message-row.group-start,
            .message-row.group-single {
                margin-top: 10px;
            }

        .message-bubble-wrap {
            max-width: 70%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .message-row.me .message-bubble-wrap {
            align-items: flex-end;
        }

        .message-row.them .message-bubble-wrap {
            align-items: flex-start;
        }

        .message-bubble-wrap.has-reactions {
            padding-top: 8px;
        }

        .message-bubble {
            position: relative;
            padding: 10px 14px;
            border-radius: 18px;
            line-height: 1.35;
            white-space: pre-wrap;
            word-break: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
        }

        .message-row.me .message-bubble {
            background: #007aff;
            color: white;
        }

        .message-row.them .message-bubble {
            background: white;
            color: black;
        }

        .attachment-bubble {
            font-style: italic;
            opacity: 0.8;
        }

        .message-time {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
        }

        .message-row.group-start .message-time,
        .message-row.group-middle .message-time {
            display: none;
        }

        .reaction-badges {
            position: absolute;
            top: 0;
            right: 8px;
            transform: translateY(-35%);
            display: flex;
            gap: 4px;
            z-index: 2;
        }

        .reaction-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(0, 0, 0, 0.08);
            font-size: 13px;
            line-height: 1;
            box-shadow: 0 1px 2px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>

    <div class="landing" id="landing">
        <div class="container">
            <h1>Recover your conversation</h1>
            <p>Upload your exported chat file</p>

            <div class="drop-zone" id="dropZone">
                Click or drag a file here
            </div>

            <input type="file" id="fileInput" accept=".txt" />
            <div class="status" id="status"></div>
        </div>
    </div>

    <div class="chat-view" id="chatView">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-header-name" id="chatHeaderName"></div>
                <div class="chat-header-meta" id="chatHeaderMeta"></div>
            </div>
            <button id="downloadBtn">Download HTML</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
    </div>

    <script>const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const status = document.getElementById('status');
        const landing = document.getElementById('landing');
        const chatView = document.getElementById('chatView');
        const chatMessages = document.getElementById('chatMessages');
        const chatHeaderName = document.getElementById('chatHeaderName');
        const chatHeaderMeta = document.getElementById('chatHeaderMeta');
        const downloadBtn = document.getElementById('downloadBtn');

        dropZone.onclick = () => fileInput.click();

        fileInput.addEventListener('change', handleFile);

        dropZone.addEventListener('dragover', e => e.preventDefault());

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) readFile(file);
        });

        downloadBtn.addEventListener('click', () => {
            if (!window.chatMessagesData || !window.chatMessagesData.length) return;

            const html = generateExportHTML();
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = 'chatvault_export.html';
            document.body.appendChild(a);
            a.click();
            a.remove();

            setTimeout(() => URL.revokeObjectURL(url), 1000);
        });

        function handleFile(e) {
            const file = e.target.files[0];
            if (file) readFile(file);
        }

        function readFile(file) {
            const reader = new FileReader();

            reader.onload = e => {
                const text = e.target.result;
                const messages = parseMessages(text);
                const normalizedMessages = applyReactions(messages);

                window.chatMessagesData = normalizedMessages;

                status.innerText = `Loaded ${normalizedMessages.length.toLocaleString()} display messages`;

                renderConversation(normalizedMessages);
            };

            reader.readAsText(file);
        }

        function parseMessages(rawText) {
            const lines = rawText.split('\n');
            const messages = [];

            for (const line of lines) {
                if (!line.includes('|')) continue;

                const parts = line.split('|').map(part => part.trim());
                if (parts.length < 3) continue;

                const timestamp = parts[0];
                const sender = parts[1];
                const rawMessageText = parts.slice(2).join(' | ');

                if (!timestamp || !sender) continue;

                const cleanedText = cleanMessageText(rawMessageText);
                const isAttachmentOnly = cleanedText.length === 0 && containsAttachmentPlaceholder(rawMessageText);

                if (!cleanedText && !isAttachmentOnly) continue;

                messages.push({
                    timestamp,
                    sender,
                    text: isAttachmentOnly ? '[Attachment]' : cleanedText,
                    isAttachmentOnly,
                    reactions: []
                });
            }

            return messages;
        }

        function cleanMessageText(text) {
            return text
                .replace(/\uFFFC/g, '')
                .replace(/\uFFFD/g, '')
                .replace(/[\u200B-\u200D\uFEFF]/g, '')
                .trim();
        }

        function containsAttachmentPlaceholder(text) {
            return /[\uFFFC\uFFFD]/.test(text);
        }

        function normalizeComparableText(text) {
            return text
                .replace(/\uFFFC/g, '')
                .replace(/\uFFFD/g, '')
                .replace(/[\u200B-\u200D\uFEFF]/g, '')
                .replace(/[“”]/g, '"')
                .replace(/[‘’]/g, "'")
                .replace(/…/g, '...')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase();
        }

        function stripOuterQuotes(text) {
            return text
                .replace(/^[“"]+/, '')
                .replace(/[”"]+$/, '')
                .trim();
        }

        function removeTrailingEllipsis(text) {
            return text.replace(/(\.\.\.|…)+\s*$/g, '').trim();
        }

        function applyReactions(messages) {
            const kept = [];

            for (let i = 0; i < messages.length; i++) {
                const message = {
                    ...messages[i],
                    reactions: [...(messages[i].reactions || [])]
                };

                const reactionData = parseReactionMessage(message.text);

                if (!reactionData) {
                    kept.push(message);
                    continue;
                }

                const targetIndex = findReactionTargetIndex(kept, message.sender, reactionData.targetText);

                if (targetIndex === -1) {
                    kept.push(message);
                    continue;
                }

                kept[targetIndex].reactions.push({
                    reactor: message.sender,
                    label: reactionData.label,
                    emoji: reactionData.emoji
                });
            }

            return kept;
        }

        function parseReactionMessage(text) {
            const cleaned = text.trim();
            const labels = ['Loved', 'Liked', 'Disliked', 'Laughed at', 'Emphasized', 'Questioned'];

            for (const label of labels) {
                if (!cleaned.startsWith(label + ' ')) continue;

                let remainder = cleaned.slice(label.length).trim();
                remainder = stripOuterQuotes(remainder);

                if (!remainder) return null;

                const emojiMap = {
                    Loved: '❤️',
                    Liked: '👍',
                    Disliked: '👎',
                    'Laughed at': '😂',
                    Emphasized: '‼️',
                    Questioned: '❓'
                };

                return {
                    label,
                    emoji: emojiMap[label],
                    targetText: remainder
                };
            }

            return null;
        }

        function scoreReactionMatch(message, reactorSender, targetText) {
            const normalizedMessage = normalizeComparableText(message.text);
            const normalizedTarget = normalizeComparableText(targetText);

            if (!normalizedMessage || !normalizedTarget) return -1;

            const messageNoEllipsis = removeTrailingEllipsis(normalizedMessage);
            const targetNoEllipsis = removeTrailingEllipsis(normalizedTarget);

            let score = -1;

            if (messageNoEllipsis === targetNoEllipsis) {
                score = 100;
            } else if (messageNoEllipsis.startsWith(targetNoEllipsis) && targetNoEllipsis.length >= 8) {
                score = 90;
            } else if (targetNoEllipsis.startsWith(messageNoEllipsis) && messageNoEllipsis.length >= 8) {
                score = 85;
            } else if (messageNoEllipsis.includes(targetNoEllipsis) && targetNoEllipsis.length >= 12) {
                score = 70;
            } else if (targetNoEllipsis.includes(messageNoEllipsis) && messageNoEllipsis.length >= 12) {
                score = 65;
            }

            if (score === -1) return -1;

            if (message.sender !== reactorSender) {
                score += 10;
            }

            if (message.isAttachmentOnly) {
                score -= 20;
            }

            return score;
        }

        function findReactionTargetIndex(messages, reactorSender, targetText) {
            let bestIndex = -1;
            let bestScore = -1;

            for (let i = messages.length - 1; i >= 0; i--) {
                const score = scoreReactionMatch(messages[i], reactorSender, targetText);

                if (score > bestScore) {
                    bestScore = score;
                    bestIndex = i;
                }

                if (score >= 110) {
                    return i;
                }
            }

            return bestScore >= 70 ? bestIndex : -1;
        }

        function renderConversation(messages) {
            chatMessages.innerHTML = '';

            const other = messages.find(m => m.sender !== 'Me')?.sender || 'Conversation';
            chatHeaderName.innerText = other;
            chatHeaderMeta.innerText = `${messages.length.toLocaleString()} messages`;

            for (let i = 0; i < messages.length; i++) {
                const m = messages[i];
                const prev = messages[i - 1];
                const next = messages[i + 1];

                const sameAsPrev = prev && prev.sender === m.sender;
                const sameAsNext = next && next.sender === m.sender;

                let groupType = 'group-single';

                if (!sameAsPrev && sameAsNext) {
                    groupType = 'group-start';
                } else if (sameAsPrev && sameAsNext) {
                    groupType = 'group-middle';
                } else if (sameAsPrev && !sameAsNext) {
                    groupType = 'group-end';
                }

                const row = document.createElement('div');
                row.className = `message-row ${m.sender === 'Me' ? 'me' : 'them'} ${groupType}`;

                const wrap = document.createElement('div');
                wrap.className = 'message-bubble-wrap';

                if (m.reactions && m.reactions.length) {
                    wrap.classList.add('has-reactions');
                }

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';

                if (m.isAttachmentOnly) {
                    bubble.classList.add('attachment-bubble');
                }

                bubble.textContent = m.text;
                wrap.appendChild(bubble);

                if (m.reactions && m.reactions.length) {
                    const reactionContainer = document.createElement('div');
                    reactionContainer.className = 'reaction-badges';

                    for (const reaction of m.reactions) {
                        const badge = document.createElement('div');
                        badge.className = 'reaction-badge';
                        badge.textContent = reaction.emoji;
                        badge.title = `${reaction.reactor} ${reaction.label.toLowerCase()} this message`;
                        reactionContainer.appendChild(badge);
                    }

                    wrap.appendChild(reactionContainer);
                }

                const time = document.createElement('div');
                time.className = 'message-time';
                time.textContent = formatTimestamp(m.timestamp);

                wrap.appendChild(time);
                row.appendChild(wrap);
                chatMessages.appendChild(row);
            }

            landing.style.display = 'none';
            chatView.style.display = 'block';

            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'auto'
            });
        }

        function formatTimestamp(timestamp) {
            const date = new Date(timestamp.replace(' ', 'T'));

            if (Number.isNaN(date.getTime())) {
                return timestamp;
            }

            return date.toLocaleString([], {
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function generateExportHTML() {
            const cloned = chatView.cloneNode(true);

            const btn = cloned.querySelector('#downloadBtn');
            if (btn) {
                btn.remove();
            }

            return `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Vault Export</title>
<style>${document.querySelector('style').innerHTML}</style>
</head>
<body>
${cloned.outerHTML}
</body>
</html>`;
        }</script>

</body>
</html>
